<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pony Up - Premium Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header>
            <h1 class="logo">Pony Up <span>Classics</span></h1>
            <p class="subtitle">Grand Circuit Stakes</p>
        </header>

        <main id="board-area">
            <!-- Left Side: Pot and Scratched Horses -->
            <aside id="scratch-pot-area">
                <div class="pot-display">
                    <h2>POT</h2>
                    <div class="pot-amount"><span id="pot-value">0</span> <span class="currency">Chips</span></div>
                </div>
                
                <div class="scratched-slots">
                    <h3>Scratched</h3>
                    <div class="scratch-slot" id="scratch-1" data-cost="5">
                        <span class="slot-label">S1 (-5)</span>
                        <div class="horse-placeholder"></div>
                    </div>
                    <div class="scratch-slot" id="scratch-2" data-cost="10">
                        <span class="slot-label">S2 (-10)</span>
                        <div class="horse-placeholder"></div>
                    </div>
                    <div class="scratch-slot" id="scratch-3" data-cost="15">
                        <span class="slot-label">S3 (-15)</span>
                        <div class="horse-placeholder"></div>
                    </div>
                    <div class="scratch-slot" id="scratch-4" data-cost="20">
                        <span class="slot-label">S4 (-20)</span>
                        <div class="horse-placeholder"></div>
                    </div>
                </div>
            </aside>

            <!-- Right Side: The Racing Track -->
            <section id="track-area">
                <div class="finish-line"></div>
                <!-- Tracks will be dynamically generated by JS -->
                <div id="tracks-container"></div>
            </section>
        </main>

        <!-- Floating Controls Panel -->
        <div id="controls-panel" class="glass-panel">
            <div id="game-phase-info">
                <h3 id="phase-title">Ready to Play</h3>
                <p id="phase-instructions">Click 'Start Game' to begin the Scratch Phase.</p>
            </div>
            
            <div class="dice-display">
                <div class="die" id="die-1"><span class="die-face">⚀</span></div>
                <div class="die" id="die-2"><span class="die-face">⚀</span></div>
                <div class="roll-total" id="roll-total">-</div>
            </div>

            <button id="action-button" class="btn-primary">Start Game</button>
            <button id="reset-button" class="btn-icon" title="Reset Game">⟳</button>
        </div>

        <!-- Overlays/Modals -->
        <div id="modal-overlay" class="hidden">
            <div class="modal glass-panel">
                <h2 id="modal-title">Welcome to Pony Up</h2>
                <p id="modal-content">The classic casino horse racing game.</p>
                <button id="modal-close" class="btn-primary">Let's Ride</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
